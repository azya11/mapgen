<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>mapgen · 3D viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0:#070a12; --bg1:#0c1120;
    --panel:rgba(15,20,33,.66);
    --panel-solid:#0f1421;
    --line:rgba(255,255,255,.08);
    --line-hi:rgba(255,255,255,.16);
    --txt:#e9eef8; --muted:#8a95ad; --muted-2:#5e6b85;
    --c1:#34e7e4; --c2:#6a8dff; --c3:#b06cff;
    --grad: linear-gradient(100deg, var(--c1), var(--c2) 55%, var(--c3));
    --glow: 0 0 22px rgba(106,141,255,.45);
    --font-ui:'Inter',system-ui,sans-serif;
    --font-display:'Space Grotesk',var(--font-ui);
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; overflow:hidden; color:var(--txt);
    font-family:var(--font-ui); font-size:13px; line-height:1.5;
    background:
      radial-gradient(1200px 700px at 78% -8%, rgba(106,141,255,.16), transparent 60%),
      radial-gradient(900px 600px at 8% 108%, rgba(176,108,255,.14), transparent 55%),
      linear-gradient(180deg, var(--bg0), var(--bg1)); }
  canvas { display:block; }
  img.emoji { height:1em; width:1em; display:inline-block; vertical-align:-.15em; object-fit:contain; }

  /* ---------- glass panels ---------- */
  .glass { position:relative; background:var(--panel);
    border:1px solid var(--line); border-radius:18px;
    backdrop-filter:blur(16px) saturate(1.2); -webkit-backdrop-filter:blur(16px) saturate(1.2);
    box-shadow:0 18px 48px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06); }
  .glass::before { content:''; position:absolute; inset:0; border-radius:inherit; padding:1px;
    background:linear-gradient(140deg, rgba(52,231,228,.5), rgba(106,141,255,.15) 40%, transparent 60%, rgba(176,108,255,.45));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; opacity:.7; }

  /* ---------- control panel ---------- */
  #ui { position:fixed; top:16px; left:16px; z-index:10; width:280px; padding:16px 16px 18px;
    max-height:calc(100vh - 32px); overflow-y:auto; }
  #ui::-webkit-scrollbar { width:8px; }
  #ui::-webkit-scrollbar-thumb { background:rgba(106,141,255,.35); border-radius:8px; }
  .brand { display:flex; align-items:center; gap:9px; }
  .brand .logo { width:30px; height:30px; border-radius:9px; display:grid; place-items:center;
    background:var(--grad); box-shadow:var(--glow); font-size:16px; }
  .brand h1 { margin:0; font-family:var(--font-display); font-weight:700; font-size:18px;
    letter-spacing:.2px; background:var(--grad); background-size:200% auto;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:shimmer 6s linear infinite; }
  @keyframes shimmer { to { background-position:200% center; } }
  .tagline { color:var(--muted); font-size:11px; margin:3px 0 14px 1px; letter-spacing:.3px; }

  .sec { color:var(--muted-2); font-family:var(--font-display); font-size:10.5px;
    text-transform:uppercase; letter-spacing:.16em; margin:0 0 9px; font-weight:600; }
  .div { height:1px; margin:15px 0; background:linear-gradient(90deg, transparent, var(--line-hi), transparent); }
  .row { margin:10px 0; }

  select { width:100%; padding:9px 11px; color:var(--txt); font-family:var(--font-ui); font-size:13px;
    background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:11px;
    appearance:none; cursor:pointer;
    background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 18px) 51%, calc(100% - 13px) 51%; background-size:5px 5px,5px 5px; background-repeat:no-repeat; }
  select:hover { border-color:var(--line-hi); }

  button { font-family:var(--font-ui); font-size:13px; font-weight:500; color:var(--txt); cursor:pointer;
    padding:9px 11px; width:100%; border:1px solid var(--line); border-radius:11px;
    background:rgba(255,255,255,.04); transition:.16s ease; }
  button:hover { background:rgba(106,141,255,.14); border-color:rgba(106,141,255,.5); transform:translateY(-1px); }
  button:active { transform:translateY(0); }
  .btn-row { display:flex; gap:8px; }
  button.primary { border:none; color:#06101f; font-weight:600; background:var(--grad); background-size:160% auto;
    box-shadow:0 6px 22px rgba(106,141,255,.38); }
  button.primary:hover { background-position:right center; box-shadow:0 8px 28px rgba(176,108,255,.5); }

  /* ---------- toggle switches ---------- */
  .toggles { display:grid; grid-template-columns:1fr 1fr; gap:9px 12px; }
  .sw { display:flex; align-items:center; gap:9px; font-size:12.5px; cursor:pointer; user-select:none; color:#c5cfe1; }
  .sw input { position:absolute; opacity:0; width:0; height:0; }
  .sw .track { position:relative; flex:0 0 auto; width:34px; height:19px; border-radius:99px;
    background:rgba(255,255,255,.08); border:1px solid var(--line); transition:.22s ease; }
  .sw .track::after { content:''; position:absolute; top:2px; left:2px; width:13px; height:13px; border-radius:50%;
    background:#aab4cb; transition:.22s cubic-bezier(.4,1.3,.5,1); }
  .sw input:checked + .track { background:var(--grad); border-color:transparent; box-shadow:0 0 12px rgba(106,141,255,.55); }
  .sw input:checked + .track::after { left:17px; background:#fff; }
  .sw:hover .track { border-color:var(--line-hi); }

  /* ---------- sliders ---------- */
  .lbl { display:flex; justify-content:space-between; align-items:center; color:var(--muted);
    font-size:11px; text-transform:uppercase; letter-spacing:.07em; margin-bottom:7px; }
  .val { font-family:var(--font-mono); font-size:11.5px; color:var(--c1);
    background:rgba(52,231,228,.1); padding:1px 7px; border-radius:6px; }
  input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:99px;
    background:linear-gradient(90deg, var(--c1), var(--c2), var(--c3)); outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:17px; height:17px; border-radius:50%;
    background:#fff; border:2px solid var(--c2); box-shadow:0 0 10px rgba(106,141,255,.8); transition:.12s; }
  input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.18); }
  input[type=range]::-moz-range-thumb { width:15px; height:15px; border-radius:50%; background:#fff;
    border:2px solid var(--c2); box-shadow:0 0 10px rgba(106,141,255,.8); }

  #meta { font-size:12px; color:var(--muted); white-space:pre-line; line-height:1.7; }
  #meta b { color:var(--txt); font-family:var(--font-display); font-weight:600; font-size:13px; }
  #err { color:#ff8a8a; }

  /* ---------- legend + hud ---------- */
  #legend { position:fixed; bottom:16px; left:16px; z-index:10; padding:9px 14px;
    display:flex; gap:15px; font-size:11px; color:var(--muted); }
  #legend i { display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:6px; vertical-align:-1px;
    box-shadow:0 0 0 1px rgba(255,255,255,.12) inset; }
  #hud { position:fixed; top:16px; right:16px; z-index:10; padding:7px 13px; font-family:var(--font-mono);
    font-size:11.5px; color:var(--c1); letter-spacing:.04em; }
  #hud::before { content:''; display:inline-block; width:7px; height:7px; border-radius:50%;
    background:var(--c1); margin-right:7px; vertical-align:0; box-shadow:0 0 8px var(--c1); }

  /* ---------- loader ---------- */
  #spin { position:fixed; inset:0; display:grid; place-items:center; pointer-events:none;
    color:var(--muted); font-family:var(--font-display); font-size:14px; letter-spacing:.02em; }
  #spin .ring { width:46px; height:46px; margin:0 auto 14px; border-radius:50%;
    border:3px solid rgba(255,255,255,.08); border-top-color:var(--c1); border-right-color:var(--c2);
    animation:spin 0.9s linear infinite; }
  #spin .inner { text-align:center; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="ui" class="glass">
  <div class="brand"><span class="logo"><img class="emoji" src="web/static/emoji/1f5fa.png" alt="🗺️"></span><h1>mapgen</h1></div>
  <div class="tagline">prompt → 3D map · live viewer</div>

  <div class="row">
    <div class="lbl">Model</div>
    <select id="model"></select>
  </div>
  <div class="row btn-row">
    <button id="reload">↻ Reload</button>
    <button id="frame">⤢ Frame</button>
  </div>

  <div class="div"></div>
  <div class="sec">Display</div>
  <div class="toggles">
    <label class="sw"><input type="checkbox" id="t-rotate"><span class="track"></span>Auto-rotate</label>
    <label class="sw"><input type="checkbox" id="t-shadow" checked><span class="track"></span>Shadows</label>
    <label class="sw"><input type="checkbox" id="t-sky" checked><span class="track"></span>Sky</label>
    <label class="sw"><input type="checkbox" id="t-wire"><span class="track"></span>Wireframe</label>
    <label class="sw"><input type="checkbox" id="t-grid"><span class="track"></span>Grid</label>
    <label class="sw"><input type="checkbox" id="t-water" checked><span class="track"></span>Water</label>
  </div>

  <div class="div"></div>
  <div class="sec">Lighting</div>
  <div class="row">
    <div class="lbl">Sun direction <span class="val" id="v-az">315°</span></div>
    <input type="range" id="s-az" min="0" max="360" value="315">
  </div>
  <div class="row">
    <div class="lbl">Sun height <span class="val" id="v-el">48°</span></div>
    <input type="range" id="s-el" min="2" max="89" value="48">
  </div>
  <div class="row">
    <div class="lbl">Exposure <span class="val" id="v-ex">0.80</span></div>
    <input type="range" id="s-ex" min="20" max="160" value="80">
  </div>

  <div class="div"></div>
  <button id="shot" class="primary"><img class="emoji" src="web/static/emoji/1f4f7.png" alt="📷"> Save screenshot</button>
  <div class="row" id="meta"></div>
</div>

<div id="legend" class="glass">
  <span><i style="background:#607d4a"></i>grass</span>
  <span><i style="background:#7a7063"></i>rock</span>
  <span><i style="background:#f0f3fa"></i>snow</span>
  <span><i style="background:#d2c496"></i>sand</span>
  <span><i style="background:#3668a0"></i>water</span>
  <span><i style="background:#cecdc8"></i>buildings</span>
</div>

<div id="hud" class="glass">— fps</div>
<div id="spin"><div class="inner"><div class="ring"></div>loading…</div></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { Sky } from 'three/addons/objects/Sky.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const $ = id => document.getElementById(id);
const meta = $('meta'), spin = $('spin'), select = $('model'), hud = $('hud');

// ---------- renderer ----------
const renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 1, 5_000_000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI * 0.495;   // stay above ground

// ---------- environment reflections ----------
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// ---------- sky + sun ----------
const sky = new Sky();
sky.scale.setScalar(1_000_000);
scene.add(sky);
const skyU = sky.material.uniforms;
skyU['turbidity'].value = 8;
skyU['rayleigh'].value = 2.2;
skyU['mieCoefficient'].value = 0.005;
skyU['mieDirectionalG'].value = 0.8;

const hemi = new THREE.HemisphereLight(0xbfd6ff, 0x3a352c, 0.55);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff3df, 2.6);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
sun.shadow.bias = -0.00015;
sun.shadow.normalBias = 0.2;
scene.add(sun);
scene.add(sun.target);

let modelSpan = 1000, modelCenter = new THREE.Vector3();
// World-space bounds of the shadow casters (buildings if present, else whole
// model). The shadow frustum is fit tightly to this so building shadows land on
// the terrain at usable resolution instead of being lost across the full extent.
let casterBox = new THREE.Box3();

// Fit the directional-light shadow ortho frustum to a world-space box, as seen
// from the light. Tighter frustum -> far more shadow-map texels per metre.
const _corner = new THREE.Vector3(), _lightView = new THREE.Matrix4();
const _UP_Y = new THREE.Vector3(0, 1, 0), _UP_Z = new THREE.Vector3(0, 0, 1);
function fitShadowToBox(box) {
  if (box.isEmpty()) return;
  const cam = sun.shadow.camera;
  const dir = _corner.copy(sun.position).sub(modelCenter).normalize();
  const up = Math.abs(dir.y) > 0.999 ? _UP_Z : _UP_Y;
  // light view matrix = inverse of the light's world pose (looking at center)
  _lightView.lookAt(sun.position, modelCenter, up);
  _lightView.setPosition(sun.position);
  _lightView.invert();
  let minX = Infinity, minY = Infinity, minZ = Infinity;
  let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
  for (let i = 0; i < 8; i++) {
    _corner.set(i & 1 ? box.max.x : box.min.x,
                i & 2 ? box.max.y : box.min.y,
                i & 4 ? box.max.z : box.min.z).applyMatrix4(_lightView);
    minX = Math.min(minX, _corner.x); maxX = Math.max(maxX, _corner.x);
    minY = Math.min(minY, _corner.y); maxY = Math.max(maxY, _corner.y);
    minZ = Math.min(minZ, _corner.z); maxZ = Math.max(maxZ, _corner.z);
  }
  // pad sideways so long shadows + PCF softening aren't clipped at the edges
  const pad = Math.max(maxX - minX, maxY - minY) * 0.15 + 1;
  cam.left = minX - pad; cam.right = maxX + pad;
  cam.bottom = minY - pad; cam.top = maxY + pad;
  // view looks down -Z, so the box sits at negative z; depth = -z
  cam.near = Math.max(-maxZ - pad, 0.1);
  cam.far = -minZ + pad;
  cam.updateProjectionMatrix();
}

function applySun() {
  const az = +$('s-az').value, el = +$('s-el').value;
  $('v-az').textContent = az + '°'; $('v-el').textContent = el + '°';
  const phi = THREE.MathUtils.degToRad(90 - el);
  const theta = THREE.MathUtils.degToRad(az);
  const dir = new THREE.Vector3().setFromSphericalCoords(1, phi, theta);
  skyU['sunPosition'].value.copy(dir);
  sun.position.copy(modelCenter).add(dir.clone().multiplyScalar(modelSpan * 1.6));
  sun.target.position.copy(modelCenter);
  fitShadowToBox(casterBox);
  // tint fog/hemisphere with sun height
  const warm = THREE.MathUtils.clamp(1 - el / 90, 0, 1);
  scene.fog && scene.fog.color.setHSL(0.58 - warm * 0.12, 0.5, 0.62 - warm * 0.12);
}

// ---------- grid ----------
let grid = null;
function rebuildGrid() {
  if (grid) { scene.remove(grid); grid.geometry.dispose(); grid = null; }
  if (!$('t-grid').checked) return;
  grid = new THREE.GridHelper(modelSpan * 2.2, 44, 0x33405a, 0x202836);
  grid.position.copy(modelCenter); grid.position.y -= modelSpan * 0.002;
  scene.add(grid);
}

// ---------- model loading ----------
const loader = new GLTFLoader();
const BASE = 'output/';
let current = null;
const meshes = { terrain:[], buildings:[], vegetation:[], water:[], other:[] };

function classify(name='') {
  name = name.toLowerCase();
  if (name.includes('water')) return 'water';
  if (name.includes('terrain')) return 'terrain';
  if (name.includes('building')) return 'buildings';
  if (name.includes('veget') || name.includes('tree') || name.includes('forest')) return 'vegetation';
  return 'other';
}

function styleMaterials() {
  for (const k of Object.keys(meshes)) meshes[k] = [];
  current.traverse(o => {
    if (!o.isMesh) return;
    const kind = classify(o.name || (o.parent && o.parent.name));
    meshes[kind].push(o);
    const m = o.material;
    m.vertexColors = true;
    m.envMapIntensity = 0.5;
    o.castShadow = true; o.receiveShadow = true;
    // The GLB ships without vertex normals, so GLTFLoader turns on flatShading;
    // a mesh in that state isn't lit/shadowed correctly. Give every mesh real
    // normals. Buildings are de-indexed first so each face keeps its own normal
    // (crisp edges, not smoothed blobs); the terrain stays indexed so its hills
    // shade smoothly and show the building shadows on the "floor".
    if (!o.geometry.attributes.normal) {
      if (kind === 'buildings' && o.geometry.index) o.geometry = o.geometry.toNonIndexed();
      o.geometry.computeVertexNormals();
    }
    m.flatShading = false;
    if (kind === 'water') {
      m.roughness = 0.06; m.metalness = 0.15;
      m.transparent = true; m.opacity = 0.72; m.depthWrite = false;
      m.envMapIntensity = 1.0; o.castShadow = false; o.receiveShadow = false;
      m.color.setRGB(1,1,1);
    } else if (kind === 'buildings') {
      m.roughness = 0.6; m.metalness = 0.08; m.envMapIntensity = 0.7;
    } else if (kind === 'vegetation') {
      m.roughness = 0.9; m.metalness = 0.0; o.receiveShadow = false;
    } else {
      m.roughness = 0.96; m.metalness = 0.0;
    }
    m.needsUpdate = true;
  });
}

function frame() {
  const box = new THREE.Box3().setFromObject(current);
  const size = box.getSize(new THREE.Vector3());
  modelCenter = box.getCenter(new THREE.Vector3());
  modelSpan = Math.max(size.x, size.z) || 1000;
  // shadow casters: the buildings (tight box) if any, otherwise the whole model
  casterBox.makeEmpty();
  if (meshes.buildings.length) {
    const b = new THREE.Box3();
    for (const o of meshes.buildings) casterBox.union(b.setFromObject(o));
  } else casterBox.copy(box);
  controls.target.copy(modelCenter);
  camera.position.set(
    modelCenter.x + modelSpan * 0.85,
    modelCenter.y + Math.max(size.y * 2.2, modelSpan * 0.55),
    modelCenter.z + modelSpan * 0.95);
  camera.near = modelSpan / 800; camera.far = modelSpan * 60;
  camera.updateProjectionMatrix();
  controls.maxDistance = modelSpan * 6;
  controls.minDistance = modelSpan * 0.05;
  scene.fog = new THREE.Fog(0x9fb8da, modelSpan * 1.6, modelSpan * 7);
  applySun(); rebuildGrid();
  return size;
}

function load(name) {
  if (!name) return;
  spin.style.display = 'grid';
  loader.load(BASE + name, gltf => {
    if (current) { scene.remove(current); }
    current = gltf.scene;
    current.rotation.x = -Math.PI / 2;   // Z-up (metres) -> Y-up
    scene.add(current);
    styleMaterials();
    const size = frame();
    applyToggles();
    let tris = 0;
    current.traverse(o => { if (o.isMesh) { const g=o.geometry; tris += (g.index? g.index.count : g.attributes.position.count)/3; }});
    meta.innerHTML =
      `<b>${name}</b>\n` +
      `extent ≈ ${(Math.max(size.x,size.z)/1000).toFixed(2)} km   ·   relief ≈ ${size.y.toFixed(0)} m\n` +
      `${Math.round(tris).toLocaleString()} triangles\n` +
      `${meshes.buildings.length? '<img class="emoji" src="web/static/emoji/1f3d9.png" alt="🏙"> buildings  ':''}${meshes.vegetation.length?'<img class="emoji" src="web/static/emoji/1f332.png" alt="🌲"> forest  ':''}${meshes.water.length?'<img class="emoji" src="web/static/emoji/1f4a7.png" alt="💧"> water':''}`;
    spin.style.display = 'none';
  }, undefined, e => {
    meta.innerHTML = `<span id="err">Failed to load ${name}.</span>`;
    spin.style.display = 'none'; console.error(e);
  });
}

// ---------- toggles ----------
function applyToggles() {
  controls.autoRotate = $('t-rotate').checked;
  controls.autoRotateSpeed = 0.6;
  renderer.shadowMap.enabled = $('t-shadow').checked;
  sky.visible = $('t-sky').checked;
  scene.background = $('t-sky').checked ? null : new THREE.Color(0x0d1117);
  const wire = $('t-wire').checked;
  for (const k of Object.keys(meshes)) for (const o of meshes[k]) {
    o.material.wireframe = wire;
    if (k === 'water') o.visible = $('t-water').checked && !wire;
  }
  if (current) current.traverse(o => { if (o.isMesh) o.material.needsUpdate = true; });
  rebuildGrid();
}
['t-rotate','t-shadow','t-sky','t-wire','t-grid','t-water'].forEach(id => $(id).onchange = applyToggles);
['s-az','s-el'].forEach(id => $(id).oninput = applySun);
$('s-ex').oninput = () => { const v=+$('s-ex').value/100; renderer.toneMappingExposure=v; $('v-ex').textContent=v.toFixed(2); };
$('reload').onclick = () => load(select.value);
$('frame').onclick = () => { if (current) frame(); };
select.onchange = () => load(select.value);

$('shot').onclick = () => {
  renderer.render(scene, camera);
  const a = document.createElement('a');
  a.download = (select.value || 'mapgen').replace(/\.glb$/,'') + '.png';
  a.href = renderer.domElement.toDataURL('image/png');
  a.click();
};

// ---------- discover models ----------
async function discover() {
  const fromQuery = new URLSearchParams(location.search).get('model');
  let files = [];
  try {
    const html = await (await fetch(BASE)).text();
    files = [...html.matchAll(/href="([^"]+\.glb)"/g)].map(m => decodeURIComponent(m[1]).replace(/^.*\//,''));
  } catch(_) {}
  files = [...new Set(files)];
  if (fromQuery && !files.includes(fromQuery)) files.unshift(fromQuery);
  if (!files.length) files = ['nice.glb'];
  select.innerHTML = files.map(f => `<option>${f}</option>`).join('');
  if (fromQuery) select.value = fromQuery;
  load(select.value);
}

// ---------- loop ----------
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
let last = performance.now(), frames = 0, acc = 0;
(function animate(now) {
  requestAnimationFrame(animate);
  const dt = now - last; last = now; acc += dt; frames++;
  if (acc >= 500) { hud.textContent = Math.round(1000*frames/acc) + ' fps'; frames=0; acc=0; }
  controls.update();
  renderer.render(scene, camera);
})(performance.now());

discover();
</script>
</body>
</html>
